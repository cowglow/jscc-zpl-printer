<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JSCC Participant Label Printer</title>
</head>
<body>
<div id="loading-overlay" aria-hidden="true">
    <div class="spinner"></div>
</div>
<button id="open-admin" hidden>⚙ Admin</button>

<dialog id="admin-dialog" aria-labelledby="admin-dialog-title">
    <h2 id="admin-dialog-title">Admin Actions</h2>
    <label for="admin-printer-select" style="display: none">Printer</label>
    <select id="admin-printer-select">
        <option value="">Loading printers…</option>
    </select>
    <button id="participant-labels">Print&nbsp;All&nbsp;Participants</button>
    <button id="test-printer-connection" class="feature-block">Test&nbsp;Printer&nbsp;Connection</button>
    <button id="print-client-qr">Print&nbsp;WebClient&nbsp;QR</button>
    <hr/>
    <button id="close-admin">Close</button>
</dialog>

<form id="form" method="post">
    <div style="flex-direction: column">
        <img src="/jscc-og-image.png" alt="JSCC" style="width: 100%; max-width: 600px;" />
        <h1>Label Printer</h1>
        <input type="hidden" id="printer-name" name="printerName" style="padding: 0" />
        <div class="feature-block">
            <label for="file-upload">PNG to ZPL</label>
            <input type="file" id="file-upload" accept="image/png"/>
        </div>
        <div>
            <label for="participant-given-name">Given Name</label>
            <input
                    id="participant--given-name"
                    name="participantGivenName"
                    type="text"
                    placeholder="Given Name"
                    autofocus
            />
        </div>
                <div>
            <label for="participant-family-name">Family Name</label>
            <input
                    id="participant-family-name"
                    name="participantFamilyName"
                    type="text"
                    placeholder="Family Name"
                    autofocus
            />
        </div>
        <div>
            <label for="company-name">Company Name</label>
            <input
                    id="company-name"
                    name="companyName"
                    type="text"
                    placeholder="Optional"
            />
        </div>
        <div>
            <label for="tag-list">Tags</label>
            <details>
                <summary id="tag-list-help">What are tags?</summary>
                Topics or ideas you'd like to discuss, separated by commas. (e.g. JavaScript, Web Design, AI)
            </details>
            <textarea id="tag-list" name="tagList" aria-describedby="tag-list-help"
                      placeholder="HTML, CSS, JS"></textarea>
        </div>
        <button id="-print-it" type="submit">Print</button>
    </div>
</form>
<script type="module" src="src/client/main.ts"></script>
</body>
</html>
